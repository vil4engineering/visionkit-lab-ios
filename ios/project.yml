name: VisionLab
options:
  bundleIdPrefix: com.vil4max
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: BTHRDS7254
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  VisionLab:
    type: application
    platform: iOS
    sources:
      - path: VisionLab
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vil4max.visionlab
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: VisionKit Lab
      INFOPLIST_KEY_NSCameraUsageDescription: Camera access is used for VisionKit document and data scanning.
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Photo library access is used for Live Text photos and saving scanned documents.
      INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: Saved document scans are stored in your photo library when you choose Save.
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_USER_SCRIPT_SANDBOXING: YES
    scheme:
      testTargets:
        - VisionLabTests
  VisionLabTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VisionLabTests
    dependencies:
      - target: VisionLab
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vil4max.visionlab.tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VisionLab.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VisionLab"
